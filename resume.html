<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Tilothama Nunna</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .resume-section {
            max-width: 600px;
            margin: auto;
            text-align: center;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }
        .form-box {
            background: var(--card-bg, #fff);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border, #ddd);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-field:focus { outline: none; border-color: var(--accent, #007bff); }
        .input-field.invalid { border-color: #e74c3c; background: #fff8f8; }

        .btn.primary {
            background-color: var(--accent, #007bff);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
        }
        .btn.primary:hover { opacity: 0.9; }
        .btn.primary:disabled { opacity: 0.55; cursor: not-allowed; }

        .field-error {
            color: #e74c3c;
            font-size: 12.5px;
            text-align: left;
            margin: -6px 0 6px 2px;
            display: none;
        }

        #resume-content {
            display: none;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <nav class="container-wide">
        <div class="logo"><strong>TN</strong></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="skills.html">Skills</a>
            <a href="projects.html">Projects</a>
            <a href="resume.html" class="active">Resume</a>
            <a href="contact.html">Contact</a>
            <button id="theme-btn">◐</button>
        </div>
    </nav>

    <section class="resume-section">

        <div id="resume-form" class="form-box">
            <h2 style="font-size: 2rem; margin-bottom: 10px;">Unlock Full Resume</h2>
            <p>Please enter your details to view the professional CV.</p>

            <form id="resume-form-element" style="margin-top: 25px;" novalidate>

                <input type="text" id="res-name" placeholder="Full Name"
                       class="input-field" autocomplete="name">
                <div class="field-error" id="name-error"></div>

                <input type="email" id="res-email" placeholder="Email Address"
                       class="input-field" autocomplete="email">
                <div class="field-error" id="email-error"></div>

                <button type="submit" id="submit-btn" class="btn primary" style="margin-top:10px;">
                    View Resume
                </button>
            </form>
        </div>

        <div id="resume-content">
            <h2 style="color: var(--accent, #007bff); font-size: 2.5rem;">Access Granted</h2>
            <p>Thank you for your interest. You can now download the file below.</p>
            <div style="margin-top: 30px;">
                <a href="resume/Tilothama_Nunna_Resume.pdf" class="btn primary" target="_blank"
                   style="text-decoration: none; display: inline-block; width: auto;">
                    Download PDF Resume
                </a>
            </div>
        </div>

    </section>

    <script>

        const SHEET_URL = "https://script.google.com/macros/s/AKfycbwDq13WaWzSspBbf0bqMd8dWucfNNMtUi9Ais5wxVcvb7U_ygiWkA_LDcJ6XoGUlJcJLA/exec";

        const BLOCKED_DOMAINS = [
            'mailinator.com','guerrillamail.com','tempmail.com','throwam.com',
            'yopmail.com','sharklasers.com','trashmail.com','10minutemail.com',
            'fakeinbox.com','maildrop.cc','dispostable.com','spam4.me',
            'getnada.com','temp-mail.org','mailnull.com','spamgourmet.com',
            'mytemp.email','tempr.email','airmail.cc'
        ];

        function showFieldError(fieldId, errorId, msg) {
            document.getElementById(fieldId).classList.add('invalid');
            const el = document.getElementById(errorId);
            el.textContent = msg;
            el.style.display = 'block';
        }

        function clearFieldError(fieldId, errorId) {
            document.getElementById(fieldId).classList.remove('invalid');
            document.getElementById(errorId).style.display = 'none';
        }

        document.getElementById('res-name').addEventListener('input', () =>
            clearFieldError('res-name', 'name-error'));
        document.getElementById('res-email').addEventListener('input', () =>
            clearFieldError('res-email', 'email-error'));

        document.getElementById('resume-form-element').addEventListener('submit', function(e) {
            e.preventDefault();

            const name      = document.getElementById('res-name').value.trim();
            const email     = document.getElementById('res-email').value.trim().toLowerCase();
            const submitBtn = document.getElementById('submit-btn');
            let   valid     = true;

            clearFieldError('res-name',  'name-error');
            clearFieldError('res-email', 'email-error');

            /* ── Name checks ── */
            if (name.length === 0) {
                showFieldError('res-name', 'name-error', 'Please enter your full name.');
                valid = false;
            } else if (name.length < 3) {
                showFieldError('res-name', 'name-error', 'Name is too short.');
                valid = false;
            } else if (!/^[a-zA-Z\s''\-]+$/.test(name)) {
                showFieldError('res-name', 'name-error', 'Name should contain letters only.');
                valid = false;
            } else if (name.trim().split(/\s+/).length < 2) {
                showFieldError('res-name', 'name-error', 'Please enter your first and last name.');
                valid = false;
            }

            /* ── Email checks ── */
            const emailRegex = /^[a-zA-Z0-9._%+\-]{2,}@[a-zA-Z0-9\-]{2,}\.[a-zA-Z]{2,}$/;
            if (email.length === 0) {
                showFieldError('res-email', 'email-error', 'Please enter your email address.');
                valid = false;
            } else if (!emailRegex.test(email)) {
                showFieldError('res-email', 'email-error', 'Enter a valid email (e.g. john@gmail.com).');
                valid = false;
            } else {
                const domain   = email.split('@')[1];
                const tld      = domain.split('.').pop();
                const username = email.split('@')[0];

                if (BLOCKED_DOMAINS.includes(domain)) {
                    showFieldError('res-email', 'email-error', 'Disposable email addresses are not allowed.');
                    valid = false;
                } else if (tld.length < 2) {
                    showFieldError('res-email', 'email-error', 'Email domain looks invalid.');
                    valid = false;
                } else if (username.length < 2) {
                    showFieldError('res-email', 'email-error', 'Email username is too short.');
                    valid = false;
                } else if (/^(.)\1{4,}/.test(username)) {
                    showFieldError('res-email', 'email-error', 'Please enter a real email address.');
                    valid = false;
                } else if (/^\d+$/.test(username)) {
                    showFieldError('res-email', 'email-error', 'Please enter a real email address.');
                    valid = false;
                }
            }

            if (!valid) return;

            /* ── All passed → save to Google Sheet ── */
            submitBtn.innerText = "Verifying...";
            submitBtn.disabled  = true;

            fetch(SHEET_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email })
            })
            .then(() => showResume())
            .catch(() => showResume()); /* Show resume even if fetch fails */
        });

        function showResume() {
            document.getElementById('resume-form').style.display    = 'none';
            document.getElementById('resume-content').style.display = 'block';
        }

        document.getElementById('theme-btn').addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
        });

    </script>
</body>
</html>
