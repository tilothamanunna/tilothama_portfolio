<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Tilothama Nunna</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .contact-container {
            display: flex;
            gap: 4rem;
            padding: 8rem 0;
            min-height: 80vh;
        }

        .contact-info { flex: 1; }

        .contact-form {
            flex: 1.2;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .submit-btn {
            background: var(--accent);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #success-message {
            display: none;
            margin-top: 15px;
            color: green;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 1024px) {
            .contact-container {
                flex-direction: column;
                padding: 4rem 0;
            }
        }
    </style>
</head>

<body>

<nav class="container-wide">
    <div class="logo"><strong>TN</strong></div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html" class="active">Contact</a>
        <button id="theme-btn">◐</button>
    </div>
</nav>

<section class="container-wide">
    <div class="contact-container">

        <!-- LEFT SIDE -->
        <div class="contact-info">
            <h1 style="font-size:3.5rem;">Let's Connect.</h1>

            <p style="font-size:1.2rem; opacity:0.8; line-height:1.6;">
                Whether it's research, collaboration, or opportunities — feel free to reach out.
            </p>

            <div style="margin-top:2rem; line-height:2;">
                <p><strong>Email:</strong> tnunna@memphis.edu</p>
                <p><strong>Location:</strong> Memphis, TN</p>
            </div>
        </div>

        <!-- FORM -->
        <div class="contact-form">

            <form id="contact-form">

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    Send Message →
                </button>

            </form>

            <p id="success-message">
                Message sent successfully!
            </p>

        </div>

    </div>
</section>

<footer class="container-wide" style="padding:5rem 0; text-align:center;">
    <p style="opacity:0.5;">© 2026 Tilothama Nunna</p>
</footer>

<script>
const SHEET_URL =
"https://script.google.com/macros/s/AKfycbwkb7DxazkRYAurWGTvhu4qbGsowBkXio59sZD7L_QnhDMCrVAfrhn2oHenVOMrf3vbIQ/exec";

document.getElementById("contact-form").addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const subject = document.getElementById("subject").value.trim();
    const message = document.getElementById("message").value.trim();

    const btn = document.querySelector(".submit-btn");

    btn.innerText = "Sending...";
    btn.disabled = true;

    fetch(SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
            name,
            email,
            subject,
            message
        })
    });

    document.getElementById("success-message").style.display = "block";
    document.getElementById("contact-form").reset();

    btn.innerText = "Send Message →";
    btn.disabled = false;
});
</script>

</body>
</html>
